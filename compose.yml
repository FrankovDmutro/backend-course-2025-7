services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend-course-2025-7
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    command: ["node", "main.js"]
    environment:
      - SERVER_HOST=${SERVER_HOST:-0.0.0.0}
      - PORT=${PORT:-3000}
      - CACHE_DIR=${CACHE_DIR:-./cache}
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-inventory}
      - DB_USER=${DB_USER:-inventory_user}
      - DB_PASSWORD=${DB_PASSWORD:-inventory_pass}
      - DATABASE_URL=postgresql://${DB_USER:-inventory_user}:${DB_PASSWORD:-inventory_pass}@${DB_HOST:-db}:${DB_PORT:-5432}/${DB_NAME:-inventory}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ${CACHE_DIR:-./cache}:/app/cache
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: backend-course-2025-7-db
    environment:
      - POSTGRES_DB=${DB_NAME:-inventory}
      - POSTGRES_USER=${DB_USER:-inventory_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-inventory_pass}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-inventory_user} -d ${DB_NAME:-inventory}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

volumes:
  pg_data:
