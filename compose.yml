services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend-course-2025-7
    ports:
      - "3000:3000"
    command: ["node", "main.js", "--host", "0.0.0.0", "--port", "3000", "--cache", "./cache"]
    volumes:
      - ./cache:/app/cache
    restart: unless-stopped
