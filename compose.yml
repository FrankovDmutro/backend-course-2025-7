services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend-course-2025-7
    ports:
      - "3000:3000"
    command: ["node", "main.js", "--host", "0.0.0.0", "--port", "3000", "--cache", "./cache"]
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-inventory}
      - DB_USER=${POSTGRES_USER:-inventory_user}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-inventory_pass}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-inventory_user}:${POSTGRES_PASSWORD:-inventory_pass}@db:5432/${POSTGRES_DB:-inventory}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./cache:/app/cache
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: backend-course-2025-7-db
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-inventory}
      - POSTGRES_USER=${POSTGRES_USER:-inventory_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-inventory_pass}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inventory_user} -d ${POSTGRES_DB:-inventory}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

volumes:
  pg_data:
