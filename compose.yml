services:
  # app: full server from app/main.js (API + static forms + Swagger)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app
    env_file:
      - ./app/.env
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - HOST=0.0.0.0
      - PORT=3000
      - ENABLE_STATIC_ROUTES=true
    restart: unless-stopped

  # back: API-only server (без віддачі HTML сторінок)
  back:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: back
    env_file:
      - ./app/.env
    ports:
      - "3001:3001"
    command: ["node", "./back/main.js"]
    environment:
      - NODE_ENV=development
      - HOST=0.0.0.0
      - PORT=3001
      - ENABLE_STATIC_ROUTES=false
    restart: unless-stopped

  # front: окремий статичний веб-сервер для HTML форм
  front:
    image: nginx:1.27-alpine
    container_name: front
    ports:
      - "3002:80"
    volumes:
      - ./front:/usr/share/nginx/html:ro
    restart: unless-stopped