services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command:
      - npx
      - nodemon
      - -L
      - --exec
      - node --inspect=0.0.0.0:9229
      - main.js
      - --
      - --host
      - 0.0.0.0
      - --port
      - "3000"
      - --cache
      - ./cache
    ports:
      - "3000:3000"
      - "9229:9229"
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy
    environment:
      - NODE_ENV=development
      - SERVER_HOST=${SERVER_HOST:-0.0.0.0}
      - PORT=${PORT:-3000}
      - CACHE_DIR=${CACHE_DIR:-./cache}
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-inventory}
      - DB_USER=${DB_USER:-inventory_user}
      - DB_PASSWORD=${DB_PASSWORD:-inventory_pass}
      - DATABASE_URL=postgresql://${DB_USER:-inventory_user}:${DB_PASSWORD:-inventory_pass}@${DB_HOST:-db}:${DB_PORT:-5432}/${DB_NAME:-inventory}

volumes:
  node_modules: