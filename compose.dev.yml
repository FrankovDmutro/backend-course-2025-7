services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command:
      - sh
      - -c
      - npm ci && npx nodemon main.js -- --host 0.0.0.0 --port 3000 --cache ./cache
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    environment:
      - NODE_ENV=development

volumes:
  node_modules: