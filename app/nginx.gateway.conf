server {
    listen 3000;
    server_name localhost;

    access_log /dev/stdout combined;
    error_log /dev/stderr info;

    # Root path goes to the static frontend container.
    location = / {
        return 302 /RegisterForm.html;
    }

    # API and docs are forwarded to the backend container.
    location ~ ^/(inventory|register|search|api-docs)(/.*)?$ {
        proxy_pass http://back:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
    }

    # Any other path is served by the frontend container.
    location / {
        proxy_pass http://front:80;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
    }
}
